  <style>
    @font-face {
      src: local('Consolas'), local('Consolas Bold');
      font-family: 'ConsolasFallback';
      font-display: swap;
      size-adjust: 109%;
    }

    text, tspan {
      font-family: 'ConsolasFallback', Consolas, monospace;
      white-space: pre;
    }

    .bg { fill: #161b22; }
    .ascii { 
      fill: #50fa7b; 
      font-size: 14px;
    }
    .info-text {
      font-size: 20px;
    }
    .key { fill: #ffa657; }
    .value { fill: #a5d6ff; }
    .value-num { fill: #bd93f9; }
    .cc { fill: #616e7f; }
    .divider {
      fill: #616e7f;
      font-weight: bold;
    }
    .title {
      fill: #8be9fd;
      font-weight: bold;
    }

    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
      .ascii { fill: #116329; }
      .key { fill: #d4560f; }
      .value { fill: #0550ae; }
      .value-num { fill: #8250df; }
      .cc { fill: #6e7781; }
      .divider {
        fill: #6e7781;
        font-weight: bold;
      }
      .title { fill: #0969da; }
    }
  </style>

