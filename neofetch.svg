<svg xmlns="http://www.w3.org/2000/svg" width="1752" height="1510" viewBox="0 0 1752 1510">
  <style>
    @font-face {
      src: local('Consolas'), local('Consolas Bold');
      font-family: 'ConsolasFallback';
      font-display: swap;
      size-adjust: 109%;
    }

    text, tspan {
      font-family: 'ConsolasFallback', Consolas, monospace;
      font-size: 20px;
      white-space: pre;
    }

    .bg { fill: #161b22; }
    .ascii { fill: #50fa7b; }
    .key { fill: #ffa657; }
    .value { fill: #a5d6ff; }
    .value-num { fill: #bd93f9; }
    .cc { fill: #616e7f; }
    .divider {
      fill: #616e7f;
      font-weight: bold;
    }
    .title {
      fill: #8be9fd;
      font-weight: bold;
    }

    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
      .ascii { fill: #116329; }
      .key { fill: #d4560f; }
      .value { fill: #0550ae; }
      .value-num { fill: #8250df; }
      .cc { fill: #6e7781; }
      .divider {
        fill: #6e7781;
        font-weight: bold;
      }
      .title { fill: #0969da; }
    }
  </style>

  <rect class="bg" width="100%" height="100%" rx="12" />

